databases:
  - name: tesis-veterinaria-db
    plan: free
    postgresMajorVersion: 15

services:
  - type: web
    name: tesis-veterinaria-backend
    plan: free
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
      - key: DATABASE_URL
        fromDatabase:
          name: tesis-veterinaria-db
          property: connectionString
